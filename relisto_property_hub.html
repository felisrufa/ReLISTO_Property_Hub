<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReLISTO – Property Management Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --lime:       #AEC637;
  --sage:       #CDDD8E;
  --warm-gray:  #B8BA91;
  --charcoal:   #555552;
  --cream:      #DFE1CF;
  --off-white:  #F7F8F2;
  --border:     #D8DAC5;
  --ink:        #2E2E2C;
  --muted:      #777770;
  --done-bg:    #F0F5DC;
  --done-text:  #6A7A20;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito Sans','Helvetica',sans-serif;background:var(--off-white);color:var(--ink);min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
header{background:var(--charcoal);padding:0;position:sticky;top:0;z-index:100;box-shadow:0 3px 16px rgba(0,0,0,0.25);}
.header-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;gap:16px;}
.header-brand{display:flex;align-items:center;gap:12px;}
.header-title{font-size:14px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--sage);line-height:1.2;}
.header-title small{display:block;font-size:9px;font-weight:400;color:rgba(255,255,255,0.4);letter-spacing:2px;margin-top:2px;}
.progress-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.progress-lbl{font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;text-transform:uppercase;}
.progress-bar{width:140px;height:6px;background:rgba(255,255,255,0.15);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:var(--lime);border-radius:3px;transition:width 0.4s;}
.progress-count{font-size:11px;font-weight:700;color:var(--lime);}

/* ── SYNC BAR ── */
.sync-bar{background:var(--lime);color:var(--charcoal);font-size:11px;font-weight:700;padding:5px 32px;display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--charcoal);}
.sync-dot.ok{background:#1a5c1a;}
.sync-dot.error{background:#8b0000;}
.sync-dot.loading{background:var(--charcoal);animation:pulse 0.8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── TAB BAR ── */
.tab-bar{background:#fff;border-bottom:2px solid var(--border);padding:0 32px;display:flex;align-items:flex-end;gap:0;overflow-x:auto;position:sticky;top:57px;z-index:90;}
.tab{font-size:12px;font-weight:700;padding:12px 18px;border:none;background:none;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all 0.15s;letter-spacing:0.3px;display:flex;align-items:center;gap:7px;}
.tab:hover{color:var(--ink);}
.tab.active{color:var(--charcoal);border-bottom-color:var(--lime);}
.tab .tab-pct{font-size:10px;background:var(--border);color:var(--muted);padding:2px 6px;border-radius:10px;font-weight:700;}
.tab.active .tab-pct{background:var(--lime);color:var(--charcoal);}
.tab-dashboard{color:var(--charcoal);font-weight:800;}
.tab-add{color:var(--lime);border:1.5px dashed var(--lime);border-radius:5px;margin:6px 0 6px 8px;padding:5px 12px;font-size:11px;}
.tab-add:hover{background:var(--lime);color:var(--charcoal);border-style:solid;}

/* ── TOOLBAR ── */
.toolbar{padding:10px 32px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border);background:var(--off-white);}
.btn{font-family:'Nunito Sans',sans-serif;font-size:11px;font-weight:700;padding:6px 13px;border-radius:4px;border:1.5px solid var(--border);background:#fff;color:var(--ink);cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.15s;white-space:nowrap;}
.btn:hover{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}
.btn.primary{background:var(--lime);color:var(--charcoal);border-color:var(--lime);}
.btn.primary:hover{background:#8fa528;border-color:#8fa528;}
.btn.accent{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}

/* ── LEGEND ── */
.legend{padding:7px 32px;display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#fff;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── MAIN ── */
.main{max-width:920px;margin:22px auto;padding:0 18px;display:flex;flex-direction:column;gap:14px;}

/* ── SECTION CARD ── */
.section-card{background:#fff;border-radius:8px;border:1.5px solid var(--border);overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,0.04);transition:box-shadow 0.2s;}
.section-card:hover{box-shadow:0 4px 18px rgba(0,0,0,0.09);}
.section-header{display:flex;align-items:center;gap:12px;padding:14px 18px;cursor:pointer;user-select:none;border-bottom:1.5px solid var(--border);}
.sec-num{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--charcoal);background:var(--sage);padding:3px 9px;border-radius:3px;white-space:nowrap;flex-shrink:0;}
.sec-title{font-size:14px;font-weight:700;flex:1;color:var(--charcoal);}
.sec-prog{font-size:11px;color:var(--muted);white-space:nowrap;}
.sec-tog{font-size:12px;color:var(--muted);transition:transform 0.2s;}
.sec-tog.open{transform:rotate(180deg);}
.sec-body{display:none;}
.sec-body.open{display:block;}

/* ── TASK ROW ── */
.task-row{padding:14px 18px;border-bottom:1px solid #f0edea;transition:background 0.15s;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:#fafaf5;}
.task-row.done{background:var(--done-bg);}
.task-top{display:flex;align-items:flex-start;gap:10px;margin-bottom:11px;}
.task-check{width:19px;height:19px;accent-color:var(--lime);cursor:pointer;margin-top:2px;flex-shrink:0;}
.task-label{font-size:13px;font-weight:600;line-height:1.5;flex:1;color:var(--ink);transition:all 0.2s;}
.task-row.done .task-label{text-decoration:line-through;color:var(--done-text);opacity:0.65;}
.done-tag{font-size:10px;background:var(--lime);color:var(--charcoal);padding:2px 7px;border-radius:3px;font-weight:700;margin-left:8px;vertical-align:middle;}

/* ── DATE CARDS ── */
.date-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px;padding-left:29px;}
.date-card{display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;padding:8px 13px;min-width:100px;border:2px solid var(--border);background:#fff;gap:3px;transition:box-shadow 0.15s,border-color 0.15s;}
.date-card:hover{box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.date-card.start-card{border-color:#b3d4e8;background:#f0f7fc;}
.date-card.start-card.active{border-color:#2471a3;background:#daeaf7;}
.date-card.due-card{border-color:#f0c080;background:#fffaf3;}
.date-card.due-card.active{border-color:#e08020;}
.date-card.done-card{border-color:#c8dfa0;background:#f5fbe8;}
.date-card.done-card.active{border-color:var(--lime);background:var(--done-bg);}
.date-card.tappable{cursor:pointer;border-style:dashed;}
.date-card.tappable:hover{border-style:solid;}
.date-card.start-card.tappable:hover{border-color:#2471a3;background:#daeaf7;}
.date-card.done-card.tappable:hover{border-color:var(--lime);background:var(--done-bg);}
.dc-icon{font-size:16px;line-height:1;}
.dc-lbl{font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
.date-card.start-card .dc-lbl{color:#2471a3;}
.date-card.due-card .dc-lbl{color:#b06a00;}
.date-card.done-card .dc-lbl{color:var(--done-text);}
.dc-val{font-size:12px;font-weight:700;color:var(--ink);}
.dc-hint{font-size:10px;color:var(--muted);font-weight:400;}
.dc-input-wrap input[type=date]{font-family:'Nunito Sans',sans-serif;font-size:12px;font-weight:700;border:none;background:transparent;color:inherit;outline:none;width:110px;text-align:center;cursor:pointer;padding:0;}

/* ── NOTES ── */
.notes-area{padding-left:29px;display:flex;flex-direction:column;gap:8px;}
.notes-block{display:flex;flex-direction:column;gap:3px;}
.notes-hdr{display:flex;align-items:center;gap:6px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:700;}
.notes-hdr.field{color:var(--charcoal);}
.notes-input{font-family:'Nunito Sans',sans-serif;font-size:12px;border:1px solid var(--border);border-radius:5px;padding:6px 10px;background:var(--off-white);color:var(--ink);width:100%;resize:vertical;min-height:36px;line-height:1.5;transition:border-color 0.15s;}
.notes-input:focus{outline:none;border-color:var(--lime);}
.notes-input::placeholder{color:#c0bdb5;}
.badge{font-size:9px;font-weight:800;padding:2px 7px;border-radius:3px;letter-spacing:1px;text-transform:uppercase;}
.badge.instr{background:var(--lime);color:var(--charcoal);}
.badge.field{background:var(--warm-gray);color:var(--charcoal);}

/* ── ADD TASK ── */
.add-task-row{padding:9px 18px;border-top:1px dashed var(--border);background:var(--off-white);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.add-task-btn{font-size:12px;font-weight:700;color:var(--lime);background:none;border:1.5px dashed var(--lime);border-radius:5px;padding:5px 13px;cursor:pointer;transition:all 0.15s;}
.add-task-btn:hover{background:var(--lime);color:var(--charcoal);border-style:solid;}
.add-task-input-wrap{display:flex;align-items:center;gap:7px;flex:1;flex-wrap:wrap;}
.add-task-input{font-size:13px;border:1.5px solid var(--lime);border-radius:5px;padding:5px 11px;flex:1;min-width:160px;color:var(--ink);outline:none;background:#fff;font-family:'Nunito Sans',sans-serif;}
.custom-badge{font-size:9px;background:var(--sage);color:var(--charcoal);padding:2px 6px;border-radius:3px;font-weight:700;margin-left:6px;vertical-align:middle;letter-spacing:0.5px;text-transform:uppercase;}
.delete-task-btn{background:none;border:1.5px solid #e0c0c0;color:#c0392b;border-radius:4px;width:24px;height:24px;font-size:11px;cursor:pointer;flex-shrink:0;transition:all 0.15s;margin-left:auto;}
.delete-task-btn:hover{background:#c0392b;color:#fff;border-color:#c0392b;}

/* ── DASHBOARD ── */
.dashboard{max-width:920px;margin:22px auto;padding:0 18px;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:28px;}
.dash-card{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.dash-card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.1);border-color:var(--lime);transform:translateY(-1px);}
.dash-card-icon{font-size:28px;margin-bottom:10px;}
.dash-card-name{font-size:15px;font-weight:800;color:var(--charcoal);margin-bottom:6px;}
.dash-card-stats{font-size:12px;color:var(--muted);margin-bottom:12px;}
.dash-card-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.dash-card-fill{height:100%;background:var(--lime);border-radius:3px;transition:width 0.4s;}
.dash-card-pct{font-size:20px;font-weight:800;color:var(--lime);position:absolute;top:18px;right:18px;}
.dash-overdue{font-size:11px;color:#c0392b;font-weight:700;}
.dash-section-title{font-size:13px;font-weight:800;color:var(--charcoal);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.dash-combined-bar{background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:20px;margin-bottom:14px;}
.dash-combined-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.dash-combined-row:last-child{margin-bottom:0;}
.dcr-name{font-size:12px;font-weight:700;color:var(--charcoal);width:160px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dcr-bar-wrap{flex:1;height:12px;background:var(--border);border-radius:6px;overflow:hidden;}
.dcr-bar{height:100%;background:var(--lime);border-radius:6px;transition:width 0.4s;}
.dcr-pct{font-size:11px;font-weight:700;color:var(--charcoal);width:36px;text-align:right;}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(30,30,28,0.72);z-index:200;align-items:center;justify-content:center;padding:18px;}
.modal-bg.open{display:flex;}
.modal{background:#fff;border-radius:10px;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;padding:32px;position:relative;box-shadow:0 12px 48px rgba(0,0,0,0.35);}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);}
.modal h2{font-size:18px;font-weight:800;color:var(--charcoal);margin-bottom:18px;}
.chart-axis{display:flex;margin-left:200px;margin-bottom:5px;}
.chart-axis span{flex:1;font-size:10px;color:var(--muted);text-align:center;}
.tl-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.tl-label{font-size:10px;width:190px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-bar-wrap{flex:1;height:14px;background:#eee;border-radius:4px;position:relative;min-width:280px;}
.tl-bar{height:100%;border-radius:4px;position:absolute;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;}
.tl-bar-txt{font-size:9px;color:#fff;font-weight:700;white-space:nowrap;}
.tl-done-line{position:absolute;top:-3px;height:20px;width:3px;background:var(--lime);border-radius:2px;z-index:2;}
.sec-divider{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin:12px 0 5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.no-data{font-size:13px;color:var(--muted);text-align:center;padding:36px;border:2px dashed var(--border);border-radius:8px;}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px;}
.report-table th{background:var(--charcoal);color:#fff;padding:7px 10px;text-align:left;font-size:11px;letter-spacing:0.5px;}
.report-table td{padding:6px 10px;border-bottom:1px solid var(--border);}
.report-table tr:hover td{background:var(--off-white);}
.status-over{color:#c0392b;font-weight:700;}

/* ── ADD CHECKLIST MODAL ── */
.new-checklist-modal{max-width:400px;}
.new-checklist-modal input{font-family:'Nunito Sans',sans-serif;font-size:14px;border:2px solid var(--border);border-radius:6px;padding:10px 14px;width:100%;margin:8px 0 16px;color:var(--ink);outline:none;}
.new-checklist-modal input:focus{border-color:var(--lime);}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--charcoal);color:#fff;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.25);}

@media(max-width:620px){
  .header-inner,.sync-bar,.toolbar,.legend{padding-left:12px;padding-right:12px;}
  .tab-bar{padding:0 8px;}
  .main,.dashboard{margin:12px auto;}
  .task-row{padding:12px 12px;}
  .section-header{padding:12px 12px;}
  .date-row,.notes-area{padding-left:0;}
  .modal{padding:18px 12px;}
  .tl-label{width:110px;}
  .chart-axis{margin-left:120px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-brand">
      <div class="header-title">
        ReLISTO
        <small>Property Management Hub</small>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="progress-lbl">Overall Progress</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-count" id="progressCount">0 / 0</div>
    </div>
  </div>
  <div class="sync-bar">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncMsg">Connecting…</span>
  </div>
</header>

<!-- Tab Bar -->
<div class="tab-bar" id="tabBar">
  <button class="tab tab-dashboard active" onclick="switchTab('__dashboard__')">📊 Dashboard</button>
  <!-- checklist tabs injected here -->
  <button class="tab tab-add" onclick="openNewChecklistModal()">+ New Checklist</button>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <button class="btn primary" onclick="openModal('timeline')">📊 Timeline</button>
  <button class="btn primary" onclick="openModal('report')">📋 Report</button>
  <button class="btn" onclick="expandAll()">Expand All</button>
  <button class="btn" onclick="collapseAll()">Collapse All</button>
  <button class="btn" onclick="syncNow()">☁ Sync</button>
  <button class="btn accent" onclick="showBinInfo()">🔗 Share URL</button>
  <button class="btn" onclick="exportCSV()">⬇ CSV</button>
</div>

<!-- Legend -->
<div class="legend">
  <div class="legend-item"><div class="leg-dot" style="background:#b3d4e8;border:1.5px dashed #2471a3"></div>▶ Tap to Start</div>
  <div class="legend-item"><div class="leg-dot" style="background:#f0c080"></div>📅 Due Date</div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--lime);border:1.5px dashed var(--done-text)"></div>⬜ Tap when Done</div>
  <div class="legend-item"><div class="leg-dot" style="background:var(--warm-gray)"></div>💾 Auto-saves</div>
</div>

<!-- Content area -->
<div id="contentArea"></div>

<!-- Timeline / Report Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Timeline</h2>
    <div id="modalContent"></div>
  </div>
</div>

<!-- New Checklist Modal -->
<div class="modal-bg" id="newChecklistBg">
  <div class="modal new-checklist-modal">
    <button class="modal-close" onclick="closeNewChecklist()">✕</button>
    <h2>New Checklist</h2>
    <label style="font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:1px">Checklist Name</label>
    <input type="text" id="newChecklistName" placeholder="e.g. Pest Control" onkeydown="if(event.key==='Enter')confirmNewChecklist()">
    <button class="btn primary" onclick="confirmNewChecklist()" style="width:100%;padding:10px">Create Checklist</button>
  </div>
</div>

<script>
/* ── CONFIG ─────────────────────────────────────────────────── */
const MASTER_KEY       = 'YOUR_MASTER_KEY_HERE';
const DEFAULT_PROPERTY = 'ReLISTO';
const HARDCODED_BIN_ID = '69d91dd1aaba882197e525bd';
/* ─────────────────────────────────────────────────────────────── */

/* ── BUILT-IN CHECKLISTS ─────────────────────────────────────── */
const BUILT_IN_CHECKLISTS = {
  'Trash Management': {
    icon: '🗑',
    sections: [
      { id:'tr_s1', num:'01', title:'Initial Cleanup & Baseline', tasks:[
        { t:'Clean all trash cans (interior/exterior)', instr:'Inspect both indoor and outdoor cans. Wash with disinfectant, remove residue, dry completely before relining.' },
        { t:'Ensure all trash cans are lined', instr:'Use appropriate bag sizes per can. Check liner security — bags must fully cover interior lip.' },
        { t:'Remove all loose trash from floors and common areas', instr:'Walk all common areas, hallways, parking. Document before/after photos.' },
        { t:'Clean and sanitize all trash rooms/areas', instr:'Use EPA-approved disinfectant. Scrub floors, walls, door handles. Ventilate rooms after.' },
        { t:'Ensure trash areas are sealed (no pest entry points)', instr:'Inspect door seals, gaps, drains. Notify maintenance if any pest entry points are found.' }
      ]},
      { id:'tr_s2', num:'02', title:'Define Trash System', tasks:[
        { t:'Define 75% capacity rule', instr:'Cans should be emptied when 75% full — never wait until overflowing. Document rule in SOP.' },
        { t:'Define schedule for emptying floor trash cans', instr:'Set recurring schedule. Minimum once daily for high-traffic areas, twice for kitchens.' },
        { t:'Define schedule for transporting trash to main bins', instr:'Assign specific times. Coordinate with pickup days to avoid overflow.' },
        { t:'Define schedule for moving bins to street', instr:'Match Recology pickup schedule. Record pickup days for each property.' },
        { t:'Assign responsibilities (office staff, RM, PM)', instr:'Create RACI chart. Every role must have a named backup person.' },
        { t:'Document full trash SOP', instr:'SOP must cover all 7 sections. Upload to AppFolio after completion.' }
      ]},
      { id:'tr_s3', num:'03', title:'Staffing & Accountability', tasks:[
        { t:'Engage resident manager and require plan', instr:'Schedule meeting. RM must submit a written plan within 5 business days of engagement.' },
        { t:'Define roles and responsibilities by position', instr:'Document each role in writing. Include office staff, RM, PM, and any contractors.' },
        { t:'Create escalation protocol for issues', instr:'Issues must be escalated within 24hrs. Define chain: RM → PM → Director.' },
        { t:'Define tenant violation process', instr:'Review lease addendum. Document warning → notice → fine escalation steps.' }
      ]},
      { id:'tr_s4', num:'04', title:'Audit System', tasks:[
        { t:'Create daily audit protocol (office staff)', instr:'Checklist must cover all trash areas. Results logged in AppFolio daily.' },
        { t:'Create weekend audit protocol (resident manager)', instr:'RM performs Saturday and Sunday audits. Report sent to PM by Sunday 8pm.' },
        { t:'Create PM audit process (monthly/biweekly)', instr:'PM conducts surprise audits. Use photo documentation every audit.' },
        { t:'Implement 3-week audit trial', instr:'Run trial with full logging. Review results weekly. Adjust schedule if needed.' },
        { t:'Define reporting chain for issues', instr:'All audit issues reported same day. Unresolved issues escalate after 48hrs.' }
      ]},

/* ── STATE ─────────────────────────────────────────────────────── */
let allState = {};       // { checklistName: { sectionId_taskIdx: { done, startDate, dueDate, doneDate, instr, fieldNotes } } }
let allCustom = {};      // { checklistName: { sectionId: [{label}] } }
let userChecklists = []; // custom checklist names added by user
let activeTab = '__dashboard__';
let binId = '';
let syncTimer = null;
let apiKey = MASTER_KEY;
let connectedProperty = DEFAULT_PROPERTY;

function storageKey() {
  return 'relisto_hub__' + encodeURIComponent(connectedProperty.toLowerCase());
}

function stateFor(clName) {
  if (!allState[clName]) allState[clName] = {};
  return allState[clName];
}

function customFor(clName) {
  if (!allCustom[clName]) allCustom[clName] = {};
  return allCustom[clName];
}

function getSections(clName) {
  if (BUILT_IN_CHECKLISTS[clName]) return BUILT_IN_CHECKLISTS[clName].sections;
  return [{ id: clName+'_s0', num:'01', title:'Tasks', tasks:[] }];
}

function getAllChecklistNames() {
  return [...Object.keys(BUILT_IN_CHECKLISTS), ...userChecklists];
}

/* ── INIT STATE ─────────────────────────────────────────────────── */
function initAllState() {
  getAllChecklistNames().forEach(clName => {
    const st = stateFor(clName);
    const cu = customFor(clName);
    getSections(clName).forEach(sec => {
      sec.tasks.forEach((task, ti) => {
        const key = sec.id + '_t' + ti;
        if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:task.instr||'', fieldNotes:'' };
        ['startDate','dueDate','doneDate','fieldNotes'].forEach(f => { if(!(f in st[key])) st[key][f]=''; });
        if (!('instr' in st[key])) st[key].instr = task.instr||'';
        if (!('done' in st[key])) st[key].done = false;
      });
      if (!cu[sec.id]) cu[sec.id] = [];
      cu[sec.id].forEach((ct, ci) => {
        const key = sec.id + '_custom' + ci;
        if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
        ['startDate','dueDate','doneDate','fieldNotes','instr'].forEach(f => { if(!(f in st[key])) st[key][f]=''; });
        if (!('done' in st[key])) st[key].done = false;
      });
    });
  });
}

/* ── TABS ─────────────────────────────────────────────────────────── */
function renderTabs() {
  const bar = document.getElementById('tabBar');
  // Remove all except dashboard and add-button
  [...bar.querySelectorAll('.tab:not(.tab-dashboard):not(.tab-add)')].forEach(t=>t.remove());
  const addBtn = bar.querySelector('.tab-add');

  getAllChecklistNames().forEach(clName => {
    const pct = getChecklistPct(clName);
    const icon = BUILT_IN_CHECKLISTS[clName]?.icon || '📋';
    const btn = document.createElement('button');
    btn.className = 'tab' + (activeTab === clName ? ' active' : '');
    btn.innerHTML = `${icon} ${clName} <span class="tab-pct">${pct}%</span>`;
    btn.onclick = () => switchTab(clName);
    bar.insertBefore(btn, addBtn);
  });

  // Dashboard tab active state
  bar.querySelector('.tab-dashboard').classList.toggle('active', activeTab === '__dashboard__');
}

function switchTab(name) {
  syncTextareas();
  activeTab = name;
  renderTabs();
  renderContent();
  const toolbar = document.getElementById('toolbar');
  toolbar.style.display = name === '__dashboard__' ? 'none' : 'flex';
}

/* ── CONTENT RENDER ─────────────────────────────────────────────── */
function renderContent() {
  const area = document.getElementById('contentArea');
  if (activeTab === '__dashboard__') {
    renderDashboard(area);
    return;
  }
  const clName = activeTab;
  const sections = getSections(clName);
  const st = stateFor(clName);
  const cu = customFor(clName);

  let html = '<div class="main">';
  area.innerHTML = '<div class="main" id="checklistRoot"></div>';
  const root = area.querySelector('#checklistRoot');

  sections.forEach(sec => {
    const tasks = sec.tasks;
    const doneCount = tasks.filter((_,ti) => st[sec.id+'_t'+ti]?.done).length +
                      (cu[sec.id]||[]).filter((_,ci) => st[sec.id+'_custom'+ci]?.done).length;
    const total = tasks.length + (cu[sec.id]||[]).length;

    const card = document.createElement('div');
    card.className = 'section-card';

    const hdr = document.createElement('div');
    hdr.className = 'section-header';
    hdr.innerHTML = `<span class="sec-num">${sec.num}</span><span class="sec-title">${sec.title}</span><span class="sec-prog">${doneCount}/${total}</span><span class="sec-tog open" id="tog_${sec.id}">▾</span>`;
    hdr.onclick = () => { document.getElementById('body_'+sec.id)?.classList.toggle('open'); document.getElementById('tog_'+sec.id)?.classList.toggle('open'); };
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'sec-body open';
    body.id = 'body_' + sec.id;

    // Built-in tasks
    tasks.forEach((task, ti) => {
      const key = sec.id + '_t' + ti;
      const s = st[key] || { done:false, startDate:'', dueDate:'', doneDate:'', instr:task.instr||'', fieldNotes:'' };
      body.appendChild(buildTaskRow(clName, key, task.t, s, false, null, null));
    });

    // Custom tasks
    (cu[sec.id]||[]).forEach((ct, ci) => {
      const key = sec.id + '_custom' + ci;
      const s = st[key] || { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
      body.appendChild(buildCustomTaskRow(clName, sec.id, ci, ct.label, s));
    });

    // Add task button
    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    addRow.id = 'addrow_'+sec.id;
    addRow.innerHTML = `<button class="add-task-btn" onclick="showAddTask('${sec.id}','${clName}')">+ Add Task</button><div class="add-task-input-wrap" id="addinput_${sec.id}" style="display:none"><input type="text" class="add-task-input" id="addinput_text_${sec.id}" placeholder="Task name…" onkeydown="if(event.key==='Enter')confirmAddTask('${sec.id}','${clName}')"><button class="btn primary" onclick="confirmAddTask('${sec.id}','${clName}')">Add</button><button class="btn" onclick="cancelAddTask('${sec.id}')">Cancel</button></div>`;
    body.appendChild(addRow);

    card.appendChild(body);
    root.appendChild(card);
  });

  updateProgress();
}

function buildTaskRow(clName, key, label, s, isCustom, secId, ci) {
  const row = document.createElement('div');
  row.className = `task-row${s.done?' done':''}`;

  const startCard = s.startDate
    ? `<div class="date-card start-card active"><div class="dc-icon">▶</div><div class="dc-lbl">Started</div><div class="dc-input-wrap"><input type="date" value="${s.startDate}" onchange="updateF('${clName}','${key}','startDate',this.value)"></div></div>`
    : `<div class="date-card start-card tappable" onclick="stampF('${clName}','${key}','startDate')"><div class="dc-icon">▶</div><div class="dc-lbl">Start</div><div class="dc-hint">tap to begin</div></div>`;

  const dueCard = `<div class="date-card due-card${s.dueDate?' active':''}"><div class="dc-icon">📅</div><div class="dc-lbl">Due</div><div class="dc-input-wrap"><input type="date" value="${s.dueDate}" onchange="updateF('${clName}','${key}','dueDate',this.value)"></div></div>`;

  const doneCard = s.doneDate
    ? `<div class="date-card done-card active"><div class="dc-icon">✅</div><div class="dc-lbl">Completed</div><div class="dc-input-wrap"><input type="date" value="${s.doneDate}" onchange="updateF('${clName}','${key}','doneDate',this.value)"></div></div>`
    : `<div class="date-card done-card tappable" onclick="stampF('${clName}','${key}','doneDate')"><div class="dc-icon">⬜</div><div class="dc-lbl">Done</div><div class="dc-hint">tap to complete</div></div>`;

  const checkHandler = isCustom
    ? `toggleCustomF('${clName}','${secId}',${ci},this.checked)`
    : `toggleF('${clName}','${key}',this.checked)`;

  const deleteBtn = isCustom ? `<button class="delete-task-btn" onclick="deleteCustomF('${clName}','${secId}',${ci})" title="Delete task">✕</button>` : '';

  row.innerHTML = `
    <div class="task-top">
      <input type="checkbox" class="task-check" ${s.done?'checked':''} onchange="${checkHandler}">
      <div class="task-label">${label}${s.done?'<span class="done-tag">✓</span>':''}${isCustom?'<span class="custom-badge">Custom</span>':''}</div>
      ${deleteBtn}
    </div>
    <div class="date-row">${startCard}${dueCard}${doneCard}</div>
    <div class="notes-area">
      <div class="notes-block">
        <div class="notes-hdr"><span class="badge instr">Instructions</span></div>
        <textarea class="notes-input" onchange="updateF('${clName}','${key}','instr',this.value)">${s.instr}</textarea>
      </div>
      <div class="notes-block">
        <div class="notes-hdr field"><span class="badge field">Field Agent</span></div>
        <textarea class="notes-input" placeholder="Observations, notes, completion details…" onchange="updateF('${clName}','${key}','fieldNotes',this.value)">${s.fieldNotes}</textarea>
      </div>
    </div>`;
  return row;
}

function buildCustomTaskRow(clName, secId, ci, label, s) {
  return buildTaskRow(clName, secId+'_custom'+ci, label, s, true, secId, ci);
}

/* ── DASHBOARD ─────────────────────────────────────────────────── */
function renderDashboard(area) {
  const names = getAllChecklistNames();
  let html = '<div class="dashboard">';
  html += `<div class="dash-section-title">📊 All Checklists — ${connectedProperty}</div>`;
  html += '<div class="dash-grid">';

  names.forEach(clName => {
    const st = stateFor(clName);
    const cu = customFor(clName);
    const secs = getSections(clName);
    let total=0, done=0, overdue=0;
    const today = new Date().toISOString().split('T')[0];
    secs.forEach(sec => {
      sec.tasks.forEach((_,ti) => {
        const s = st[sec.id+'_t'+ti];
        if(s){total++;if(s.done)done++;if(!s.done&&s.dueDate&&s.dueDate<today)overdue++;}
      });
      (cu[sec.id]||[]).forEach((_,ci)=>{
        const s = st[sec.id+'_custom'+ci];
        if(s){total++;if(s.done)done++;if(!s.done&&s.dueDate&&s.dueDate<today)overdue++;}
      });
    });
    const pct = total ? Math.round((done/total)*100) : 0;
    const icon = BUILT_IN_CHECKLISTS[clName]?.icon || '📋';
    html += `<div class="dash-card" onclick="switchTab('${clName.replace(/'/g,"\\'")}')">
      <div class="dash-card-pct">${pct}%</div>
      <div class="dash-card-icon">${icon}</div>
      <div class="dash-card-name">${clName}</div>
      <div class="dash-card-stats">${done} of ${total} tasks complete</div>
      <div class="dash-card-bar"><div class="dash-card-fill" style="width:${pct}%"></div></div>
      ${overdue?`<div class="dash-overdue">⚠ ${overdue} overdue</div>`:''}
    </div>`;
  });

  html += '</div>';

  // Combined progress bar
  html += `<div class="dash-section-title" style="margin-top:8px">Combined Progress</div>`;
  html += '<div class="dash-combined-bar">';
  names.forEach(clName => {
    const pct = getChecklistPct(clName);
    const icon = BUILT_IN_CHECKLISTS[clName]?.icon || '📋';
    html += `<div class="dash-combined-row">
      <div class="dcr-name">${icon} ${clName}</div>
      <div class="dcr-bar-wrap"><div class="dcr-bar" style="width:${pct}%"></div></div>
      <div class="dcr-pct">${pct}%</div>
    </div>`;
  });
  html += '</div></div>';
  area.innerHTML = html;
}

function getChecklistPct(clName) {
  const st = stateFor(clName);
  const cu = customFor(clName);
  let total=0, done=0;
  getSections(clName).forEach(sec => {
    sec.tasks.forEach((_,ti)=>{ const s=st[sec.id+'_t'+ti]; if(s){total++;if(s.done)done++;} });
    (cu[sec.id]||[]).forEach((_,ci)=>{ const s=st[sec.id+'_custom'+ci]; if(s){total++;if(s.done)done++;} });
  });
  return total ? Math.round((done/total)*100) : 0;
}

/* ── STATE MUTATIONS ─────────────────────────────────────────────── */
function refreshDateRow(clName, key, field) {
  // Find the task row by looking for a checkbox tied to this key
  // and rebuild only its date-row div
  const isCustom = key.includes('_custom');
  let cb = null;
  if (isCustom) {
    const parts = key.match(/(.+)_custom(\d+)/);
    if (parts) cb = document.querySelector(`input[onchange*="toggleCustomF('${clName}','${parts[1]}',${parts[2]}"]`);
  } else {
    cb = document.querySelector(`input[onchange*="toggleF('${clName}','${key}"]`);
  }
  if (!cb) return;
  const row = cb.closest('.task-row');
  if (!row) return;
  const dateRow = row.querySelector('.date-row');
  if (!dateRow) return;

  const st = stateFor(clName);
  const s = st[key] || {};
  const isCustomKey = key.includes('_custom');

  const startCard = s.startDate
    ? `<div class="date-card start-card active"><div class="dc-icon">▶</div><div class="dc-lbl">Started</div><div class="dc-input-wrap"><input type="date" value="${s.startDate}" onchange="updateF('${clName}','${key}','startDate',this.value)"></div></div>`
    : `<div class="date-card start-card tappable" onclick="stampF('${clName}','${key}','startDate')"><div class="dc-icon">▶</div><div class="dc-lbl">Start</div><div class="dc-hint">tap to begin</div></div>`;

  const dueCard = `<div class="date-card due-card${s.dueDate?' active':''}"><div class="dc-icon">📅</div><div class="dc-lbl">Due</div><div class="dc-input-wrap"><input type="date" value="${s.dueDate||''}" onchange="updateF('${clName}','${key}','dueDate',this.value)"></div></div>`;

  const doneCard = s.doneDate
    ? `<div class="date-card done-card active"><div class="dc-icon">✅</div><div class="dc-lbl">Completed</div><div class="dc-input-wrap"><input type="date" value="${s.doneDate}" onchange="updateF('${clName}','${key}','doneDate',this.value)"></div></div>`
    : `<div class="date-card done-card tappable" onclick="stampF('${clName}','${key}','doneDate')"><div class="dc-icon">⬜</div><div class="dc-lbl">Done</div><div class="dc-hint">tap to complete</div></div>`;

  dateRow.innerHTML = startCard + dueCard + doneCard;
}

function updateTabPct(clName) {
  // Update just the % badge on the tab without re-rendering tabs
  const pct = getChecklistPct(clName);
  document.querySelectorAll('.tab').forEach(tab => {
    if (tab.textContent.includes(clName)) {
      const badge = tab.querySelector('.tab-pct');
      if (badge) badge.textContent = pct + '%';
    }
  });
  // Also update dashboard if visible
  if (activeTab === '__dashboard__') renderContent();
}

function updateF(clName, key, field, val) {
  const st = stateFor(clName);
  if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  st[key][field] = val;
  if (field === 'dueDate' || field === 'doneDate' || field === 'startDate') {
    refreshDateRow(clName, key, field);
    updateTabPct(clName);
  }
  updateProgress();
  scheduleSave();
  showSaving();
}

function stampF(clName, key, field) {
  const today = new Date().toISOString().split('T')[0];
  const st = stateFor(clName);
  if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  st[key][field] = today;
  if (field === 'doneDate') st[key].done = true;
  // Rebuild just the date-row for this task
  refreshDateRow(clName, key, field);
  if (field === 'doneDate') {
    const cb = document.querySelector(`input[onchange*="toggleF('${clName}','${key}"]`);
    if (cb) {
      cb.checked = true;
      const row = cb.closest('.task-row');
      if (row) {
        row.classList.add('done');
        const lbl = row.querySelector('.task-label');
        if (lbl && !lbl.querySelector('.done-tag')) lbl.insertAdjacentHTML('beforeend','<span class="done-tag">✓</span>');
      }
    }
  }
  updateProgress();
  updateTabPct(clName);
  scheduleSave();
  showSaving();
}

function toggleF(clName, key, checked) {
  syncTextareas();
  const st = stateFor(clName);
  if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  st[key].done = checked;
  // Update row class without full re-render
  const cb = document.querySelector(`input[onchange*="toggleF('${clName}','${key}"]`);
  if (cb) {
    const row = cb.closest('.task-row');
    if (row) {
      row.classList.toggle('done', checked);
      const lbl = row.querySelector('.task-label');
      if (lbl) {
        const existing = lbl.querySelector('.done-tag');
        if (checked && !existing) lbl.insertAdjacentHTML('beforeend','<span class="done-tag">✓</span>');
        if (!checked && existing) existing.remove();
      }
    }
  }
  updateProgress();
  updateTabPct(clName);
  scheduleSave();
  showSaving();
}

function toggleCustomF(clName, secId, ci, checked) {
  syncTextareas();
  const key = secId+'_custom'+ci;
  const st = stateFor(clName);
  if (!st[key]) st[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  st[key].done = checked;
  const cb = document.querySelector(`input[onchange*="toggleCustomF('${clName}','${secId}',${ci}"]`);
  if (cb) {
    const row = cb.closest('.task-row');
    if (row) {
      row.classList.toggle('done', checked);
      const lbl = row.querySelector('.task-label');
      if (lbl) {
        const existing = lbl.querySelector('.done-tag');
        if (checked && !existing) lbl.insertAdjacentHTML('beforeend','<span class="done-tag">✓</span>');
        if (!checked && existing) existing.remove();
      }
    }
  }
  updateProgress();
  updateTabPct(clName);
  scheduleSave();
  showSaving();
}

/* ── CUSTOM TASKS ─────────────────────────────────────────────────── */
function showAddTask(secId, clName) {
  document.getElementById('addinput_'+secId).style.display = 'flex';
  document.querySelector('#addrow_'+secId+' .add-task-btn').style.display = 'none';
  setTimeout(()=>document.getElementById('addinput_text_'+secId).focus(), 50);
}
function cancelAddTask(secId) {
  document.getElementById('addinput_'+secId).style.display = 'none';
  document.querySelector('#addrow_'+secId+' .add-task-btn').style.display = '';
  document.getElementById('addinput_text_'+secId).value = '';
}
function confirmAddTask(secId, clName) {
  const input = document.getElementById('addinput_text_'+secId);
  const label = input.value.trim();
  if (!label) { input.focus(); return; }
  const cu = customFor(clName);
  if (!cu[secId]) cu[secId] = [];
  cu[secId].push({ label });
  const key = secId+'_custom'+(cu[secId].length-1);
  stateFor(clName)[key] = { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  renderContent();
  renderTabs();
  document.getElementById('body_'+secId)?.classList.add('open');
  document.getElementById('tog_'+secId)?.classList.add('open');
  scheduleSave();
}
function deleteCustomF(clName, secId, ci) {
  if (!confirm('Delete this task?')) return;
  syncTextareas();
  const cu = customFor(clName);
  const st = stateFor(clName);
  cu[secId].splice(ci, 1);
  const newSt = {};
  cu[secId].forEach((_, newCi) => {
    const oldKey = secId+'_custom'+(newCi >= ci ? newCi+1 : newCi);
    newSt[secId+'_custom'+newCi] = st[oldKey] || { done:false, startDate:'', dueDate:'', doneDate:'', instr:'', fieldNotes:'' };
  });
  Object.keys(st).forEach(k => { if(k.startsWith(secId+'_custom')) delete st[k]; });
  Object.assign(st, newSt);
  renderContent();
  renderTabs();
  scheduleSave();
}

/* ── NEW CHECKLIST MODAL ─────────────────────────────────────────── */
function openNewChecklistModal() {
  document.getElementById('newChecklistBg').classList.add('open');
  setTimeout(()=>document.getElementById('newChecklistName').focus(), 100);
}
function closeNewChecklist() {
  document.getElementById('newChecklistBg').classList.remove('open');
  document.getElementById('newChecklistName').value = '';
}
function confirmNewChecklist() {
  const name = document.getElementById('newChecklistName').value.trim();
  if (!name) return;
  if (getAllChecklistNames().includes(name)) { alert('A checklist with that name already exists.'); return; }
  userChecklists.push(name);
  closeNewChecklist();
  initAllState();
  renderTabs();
  switchTab(name);
  scheduleSave();
  showToast('✓ "'+name+'" checklist created!');
}

/* ── PROGRESS ─────────────────────────────────────────────────────── */
function updateProgress() {
  let total=0, done=0;
  getAllChecklistNames().forEach(clName => {
    const st = stateFor(clName);
    const cu = customFor(clName);
    getSections(clName).forEach(sec => {
      sec.tasks.forEach((_,ti)=>{ const s=st[sec.id+'_t'+ti]; if(s){total++;if(s.done)done++;} });
      (cu[sec.id]||[]).forEach((_,ci)=>{ const s=st[sec.id+'_custom'+ci]; if(s){total++;if(s.done)done++;} });
    });
  });
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressCount').textContent = done+' / '+total;
}

/* ── EXPAND / COLLAPSE ───────────────────────────────────────────── */
function expandAll() {
  document.querySelectorAll('.sec-body').forEach(b=>b.classList.add('open'));
  document.querySelectorAll('.sec-tog').forEach(t=>t.classList.add('open'));
}
function collapseAll() {
  document.querySelectorAll('.sec-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.sec-tog').forEach(t=>t.classList.remove('open'));
}

/* ── SYNC ─────────────────────────────────────────────────────────── */
function setSyncStatus(status, msg) {
  document.getElementById('syncDot').className = 'sync-dot '+status;
  document.getElementById('syncMsg').textContent = msg;
}
function showSaving() {
  document.getElementById('syncDot').className = 'sync-dot loading';
  document.getElementById('syncMsg').textContent = 'Saving…';
}
function scheduleSave() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{ syncTextareas(); saveToBin(); }, 1500);
}

function payload() {
  return { allState, allCustom, userChecklists, property: connectedProperty, version:2, updatedAt: new Date().toISOString() };
}

async function createBin() {
  setSyncStatus('loading','Creating database…');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key':apiKey, 'X-Bin-Name':'ReLISTO Property Hub', 'X-Collection-Name':'ReLISTO' },
      body: JSON.stringify(payload())
    });
    const d = await r.json();
    if (d.metadata?.id) {
      binId = d.metadata.id;
      localStorage.setItem(storageKey(), binId);
      setSyncStatus('ok','✓ Connected — '+new Date().toLocaleTimeString());
      showToast('✓ Database created! Bin ID: '+binId);
    } else { setSyncStatus('error','Connection failed — check Master Key'); }
  } catch(e) { setSyncStatus('error','Network error: '+e.message); }
}

async function loadFromBin() {
  if (!apiKey || !binId) return;
  setSyncStatus('loading','Syncing…');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest', { headers:{ 'X-Master-Key':apiKey } });
    const d = await r.json();
    if (d.record?.allState) {
      // Merge DB state — DB always wins over local
      allState = d.record.allState;
      allCustom = d.record.allCustom || {};
      userChecklists = d.record.userChecklists || [];
      // Save to local as backup
      saveLocal();
      initAllState();
      renderTabs();
      renderContent();
      updateProgress();
      setSyncStatus('ok','✓ Synced — '+new Date().toLocaleTimeString());
    } else {
      setSyncStatus('error','No data found in database');
    }
  } catch(e) {
    setSyncStatus('error','Sync failed: '+e.message);
    // Fall back to local on network error
    try {
      const saved = localStorage.getItem('relisto_hub_state');
      if (saved) {
        const p = JSON.parse(saved);
        allState = p.allState||{};
        allCustom = p.allCustom||{};
        userChecklists = p.userChecklists||[];
        initAllState();
        renderTabs();
        renderContent();
        updateProgress();
        setSyncStatus('error','Offline — showing last saved data');
      }
    } catch(e2){}
  }
}

async function saveToBin() {
  saveLocal();
  if (!apiKey || !binId) return;
  setSyncStatus('loading', 'Saving…');
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/'+binId, {
      method:'PUT',
      headers:{ 'Content-Type':'application/json', 'X-Master-Key':apiKey },
      body: JSON.stringify(payload())
    });
    if (r.ok) {
      setSyncStatus('ok','✓ Saved — '+new Date().toLocaleTimeString());
    } else {
      const err = await r.json();
      setSyncStatus('error','Save failed: '+(err.message||r.status));
    }
  } catch(e) {
    setSyncStatus('error','Save failed: '+e.message);
  }
}

function saveLocal() {
  try { localStorage.setItem('relisto_hub_state', JSON.stringify({ allState, allCustom, userChecklists })); } catch(e){}
}

async function syncNow() {
  syncTextareas();
  if (binId) await loadFromBin();
  else { saveToBin(); showToast('Saved locally.'); }
}

function showBinInfo() {
  const url = window.location.href;
  if (navigator.clipboard) navigator.clipboard.writeText(url).then(()=>showToast('✓ URL copied — share with your team!'));
  alert('Share this URL:\n'+url+'\n\nBin ID: '+(binId||'Not connected'));
}

/* ── SYNC TEXTAREAS ─────────────────────────────────────────────── */
function syncTextareas() {
  document.querySelectorAll('textarea').forEach(ta => {
    const oc = ta.getAttribute('onchange')||'';
    const m = oc.match(/updateF\('([^']+)','([^']+)','([^']+)'/);
    if (m) {
      const st = stateFor(m[1]);
      if (st[m[2]]) st[m[2]][m[3]] = ta.value;
    }
  });
}

/* ── MODAL ─────────────────────────────────────────────────────── */
let currentModalType = 'timeline';
function openModal(type) {
  currentModalType = type;
  document.getElementById('modalTitle').textContent = type === 'timeline' ? 'Timeline' : 'Report';
  document.getElementById('modalBg').classList.add('open');
  type === 'timeline' ? renderTimeline() : renderReport();
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }

function renderTimeline() {
  const wrap = document.getElementById('modalContent');
  const clName = activeTab === '__dashboard__' ? null : activeTab;
  const items = [];
  const names = clName ? [clName] : getAllChecklistNames();

  names.forEach(name => {
    const st = stateFor(name);
    const cu = customFor(name);
    getSections(name).forEach(sec => {
      sec.tasks.forEach((task,ti) => {
        const s = st[sec.id+'_t'+ti];
        if (s && (s.dueDate||s.doneDate)) items.push({ label:task.t, section:sec.title, checklist:name, dueDate:s.dueDate, doneDate:s.doneDate, done:s.done });
      });
      (cu[sec.id]||[]).forEach((ct,ci) => {
        const s = st[sec.id+'_custom'+ci];
        if (s && (s.dueDate||s.doneDate)) items.push({ label:ct.label, section:sec.title, checklist:name, dueDate:s.dueDate, doneDate:s.doneDate, done:s.done });
      });
    });
  });

  if (!items.length) { wrap.innerHTML='<div class="no-data">No dates set yet.</div>'; return; }

  items.sort((a,b)=>(a.dueDate||'9999').localeCompare(b.dueDate||'9999'));
  const allTs = []; items.forEach(i=>{ if(i.dueDate) allTs.push(new Date(i.dueDate).getTime()); if(i.doneDate) allTs.push(new Date(i.doneDate).getTime()); });
  const minD=Math.min(...allTs), maxD=Math.max(...allTs), range=maxD-minD||86400000;
  const fmt = d => { if(!d) return ''; const dt=new Date(d); return `${dt.getMonth()+1}/${dt.getDate()}`; };
  const pct = t => Math.max(0,Math.min(97,((t-minD)/range)*100));

  let html = '<div style="min-width:520px;overflow-x:auto"><div class="chart-axis">';
  for(let i=0;i<=5;i++) html+=`<span>${fmt(new Date(minD+(range*i/5)))}</span>`;
  html+='</div>';

  let lastSec='';
  items.forEach(item => {
    if(item.section!==lastSec){ html+=`<div class="sec-divider">${item.checklist} / ${item.section}</div>`; lastSec=item.section; }
    const dueT = item.dueDate?new Date(item.dueDate).getTime():null;
    const doneT= item.doneDate?new Date(item.doneDate).getTime():null;
    const left = dueT?pct(dueT):0;
    const donePct = doneT?pct(doneT):null;
    html+=`<div class="tl-row">
      <div class="tl-label" title="${item.label}">${item.done?'✓ ':''}${item.label}</div>
      <div class="tl-bar-wrap">
        ${dueT?`<div class="tl-bar" style="background:var(--lime);opacity:0.75;left:${left}%;width:${Math.max(8,100-left)}%"><span class="tl-bar-txt">${fmt(item.dueDate)}</span></div>`:''}
        ${donePct!==null?`<div class="tl-done-line" style="left:${donePct}%"></div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML = html;
}

function renderReport() {
  const wrap = document.getElementById('modalContent');
  syncTextareas();
  const today = new Date().toISOString().split('T')[0];
  let html = '';

  // Summary cards
  let grandTotal=0, grandDone=0, grandOver=0;
  const names = getAllChecklistNames();
  names.forEach(clName => {
    const st=stateFor(clName), cu=customFor(clName);
    getSections(clName).forEach(sec=>{
      sec.tasks.forEach((_,ti)=>{ const s=st[sec.id+'_t'+ti]; if(s){grandTotal++;if(s.done)grandDone++;if(!s.done&&s.dueDate&&s.dueDate<today)grandOver++;} });
      (cu[sec.id]||[]).forEach((_,ci)=>{ const s=st[sec.id+'_custom'+ci]; if(s){grandTotal++;if(s.done)grandDone++;if(!s.done&&s.dueDate&&s.dueDate<today)grandOver++;} });
    });
  });

  html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
    <div style="background:var(--off-white);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;min-width:130px"><div style="font-size:28px;font-weight:800;color:var(--lime)">${grandDone}/${grandTotal}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Total Tasks</div></div>
    <div style="background:var(--off-white);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;min-width:130px"><div style="font-size:28px;font-weight:800;color:var(--lime)">${grandTotal?Math.round((grandDone/grandTotal)*100):0}%</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Complete</div></div>
    <div style="background:var(--off-white);border:1.5px solid var(--border);border-radius:8px;padding:14px 18px;min-width:130px"><div style="font-size:28px;font-weight:800;color:${grandOver?'#c0392b':'var(--lime)'}">${grandOver}</div><div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Overdue</div></div>
  </div>`;

  // Per checklist table
  html+=`<div style="font-weight:800;font-size:13px;color:var(--charcoal);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">By Checklist</div>`;
  html+=`<table class="report-table"><tr><th>Checklist</th><th>Done</th><th>Total</th><th>%</th><th>Overdue</th></tr>`;
  names.forEach(clName => {
    const st=stateFor(clName), cu=customFor(clName);
    let t=0,d=0,o=0;
    getSections(clName).forEach(sec=>{
      sec.tasks.forEach((_,ti)=>{ const s=st[sec.id+'_t'+ti]; if(s){t++;if(s.done)d++;if(!s.done&&s.dueDate&&s.dueDate<today)o++;} });
      (cu[sec.id]||[]).forEach((_,ci)=>{ const s=st[sec.id+'_custom'+ci]; if(s){t++;if(s.done)d++;if(!s.done&&s.dueDate&&s.dueDate<today)o++;} });
    });
    const p=t?Math.round((d/t)*100):0;
    const icon=BUILT_IN_CHECKLISTS[clName]?.icon||'📋';
    html+=`<tr><td>${icon} ${clName}</td><td>${d}</td><td>${t}</td><td><b style="color:${p===100?'var(--done-text)':'var(--charcoal)'}">${p}%</b></td><td>${o?`<span class="status-over">${o}</span>`:'—'}</td></tr>`;
  });
  html+='</table>';

  // Overdue tasks
  const overdueItems = [];
  names.forEach(clName => {
    const st=stateFor(clName), cu=customFor(clName);
    getSections(clName).forEach(sec=>{
      sec.tasks.forEach((task,ti)=>{ const s=st[sec.id+'_t'+ti]; if(s&&!s.done&&s.dueDate&&s.dueDate<today) overdueItems.push({cl:clName,label:task.t,due:s.dueDate}); });
      (cu[sec.id]||[]).forEach((ct,ci)=>{ const s=st[sec.id+'_custom'+ci]; if(s&&!s.done&&s.dueDate&&s.dueDate<today) overdueItems.push({cl:clName,label:ct.label,due:s.dueDate}); });
    });
  });
  if (overdueItems.length) {
    html+=`<div style="font-weight:800;font-size:13px;color:#c0392b;text-transform:uppercase;letter-spacing:1px;margin:18px 0 8px">⚠ Overdue Tasks</div>`;
    html+=`<table class="report-table"><tr><th>Checklist</th><th>Task</th><th>Due</th></tr>`;
    overdueItems.forEach(i=>html+=`<tr><td>${i.cl}</td><td>${i.label}</td><td class="status-over">${i.due}</td></tr>`);
    html+='</table>';
  }
  wrap.innerHTML = html;
}

/* ── CSV EXPORT ─────────────────────────────────────────────────── */
function exportCSV() {
  syncTextareas();
  let csv = 'Checklist,Section,Task,Done,Start Date,Due Date,Done Date,Instructions,Field Agent\n';
  const clName = activeTab === '__dashboard__' ? null : activeTab;
  const names = clName ? [clName] : getAllChecklistNames();
  names.forEach(name => {
    const st=stateFor(name), cu=customFor(name);
    const esc = v=>(v||'').replace(/"/g,'""');
    getSections(name).forEach(sec=>{
      sec.tasks.forEach((task,ti)=>{ const s=st[sec.id+'_t'+ti]||{}; csv+=`"${name}","${sec.title}","${task.t}","${s.done?'Yes':'No'}","${s.startDate||''}","${s.dueDate||''}","${s.doneDate||''}","${esc(s.instr)}","${esc(s.fieldNotes)}"\n`; });
      (cu[sec.id]||[]).forEach((ct,ci)=>{ const s=st[sec.id+'_custom'+ci]||{}; csv+=`"${name} (Custom)","${sec.title}","${ct.label}","${s.done?'Yes':'No'}","${s.startDate||''}","${s.dueDate||''}","${s.doneDate||''}","${esc(s.instr)}","${esc(s.fieldNotes)}"\n`; });
    });
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='relisto_property_hub.csv';
  a.click();
}

function showToast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2500);
}

document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeModal(); });
document.getElementById('newChecklistBg').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeNewChecklist(); });
document.getElementById('toolbar').style.display = 'none'; // hidden on dashboard

/* ── BOOT ─────────────────────────────────────────────────────── */
initAllState();
// Show empty state immediately so page renders fast
renderTabs();
renderContent();
updateProgress();

// Auto-connect — always use hardcoded bin ID so everyone shares the same data
if (MASTER_KEY && MASTER_KEY !== 'YOUR_MASTER_KEY_HERE') {
  binId = HARDCODED_BIN_ID;
  setSyncStatus('loading', 'Loading latest data…');
  loadFromBin();
} else {
  setSyncStatus('error','No Master Key — open file and replace YOUR_MASTER_KEY_HERE');
}

// Auto-poll every 30 seconds for changes from other users
setInterval(() => {
  if (binId && apiKey && !syncTimer) {
    silentPoll();
  }
}, 30000);

async function silentPoll() {
  try {
    const r = await fetch('https://api.jsonbin.io/v3/b/'+binId+'/latest', {
      headers:{ 'X-Master-Key': apiKey }
    });
    const d = await r.json();
    if (!d.record?.allState) return;

    // Check if remote data is different from local
    const remoteStr = JSON.stringify(d.record.allState) + JSON.stringify(d.record.allCustom||{});
    const localStr  = JSON.stringify(allState) + JSON.stringify(allCustom);

    if (remoteStr !== localStr) {
      // Remote has changes — sync in
      syncTextareas();
      allState = d.record.allState;
      allCustom = d.record.allCustom || {};
      userChecklists = d.record.userChecklists || [];
      initAllState();
      renderTabs();
      renderContent();
      updateProgress();
      setSyncStatus('ok', '✓ Updated — ' + new Date().toLocaleTimeString());
      showToast('🔄 Form updated by another user');
    }
  } catch(e) {
    // Silent fail — don't show error for background polls
  }
}
